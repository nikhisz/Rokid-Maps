name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Find Android project folder
        id: findproject
        run: |
          echo "Searching for gradlew..."
          GRADLEW_PATH=$(find . -name gradlew -type f | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "No gradlew file found."
            echo "This may not be a normal Android/Gradle project."
            echo "Here are the top-level files:"
            find . -maxdepth 3 -type f | sort | head -200
            exit 1
          fi

          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "Found gradlew in: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Make Gradle executable
        run: chmod +x ./gradlew
        working-directory: ${{ steps.findproject.outputs.project_dir }}

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: ${{ steps.findproject.outputs.project_dir }}

      - name: Show APK files
        run: find . -type f -name "*.apk" -print

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: built-apk
          path: "**/*.apk"
          if-no-files-found: error
